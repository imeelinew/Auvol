name: Auvol
options:
  bundleIdPrefix: com.eli
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true
  fileTypes:
    icon:
      file: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    PRODUCT_BUNDLE_IDENTIFIER: com.eli.Auvol
    PRODUCT_NAME: Auvol
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_STYLE: Automatic

targets:
  Auvol:
    type: application
    platform: macOS
    sources:
      - path: Auvol
        excludes:
          - "Info.plist"
      - path: Auvol.icon
        buildPhase: resources
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: Auvol
    info:
      path: Auvol/Info.plist
      properties:
        CFBundleName: Auvol
        CFBundleDisplayName: Auvol
        CFBundleIconName: Auvol
        CFBundleExecutable: $(EXECUTABLE_NAME)
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleShortVersionString: $(MARKETING_VERSION)
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        LSUIElement: true
        NSHighResolutionCapable: true
        NSLocalNetworkUsageDescription: "Auvol needs local network access to receive audio from other devices."
        NSBonjourServices:
          - "_auvol._udp."
        LSApplicationCategoryType: public.app-category.utilities
